<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff004c,#ff7a00,#00c3ff);
  animation:bgMove 8s infinite alternate ease-in-out;
  padding:20px;
}

@keyframes bgMove{
  0%{filter:hue-rotate(0deg);}
  100%{filter:hue-rotate(40deg);}
}

.card{
  background:#b3122d;
  width:100%;
  max-width:400px;
  border-radius:20px;
  padding:35px 25px;
  text-align:center;
  color:white;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  position:relative;
  overflow:hidden;
}

.card h2{
  font-size:clamp(24px,5vw,36px);
  font-weight:300;
}

.card h1{
  font-size:clamp(45px,10vw,65px);
  font-weight:900;
  letter-spacing:4px;
  margin-top:-8px;
}

.emoji{
  font-size:clamp(28px,6vw,40px);
  margin:15px 0;
}

.message{
  font-size:clamp(14px,3.5vw,16px);
  line-height:1.6;
  margin-top:10px;
}

.from{
  margin-top:20px;
  font-weight:bold;
  font-size:clamp(14px,3.5vw,16px);
  color:#ffd700;
}

.btn{
  margin-top:25px;
  padding:12px 28px;
  border:none;
  border-radius:30px;
  background:white;
  color:#b3122d;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#ffd700;
  transform:scale(1.08);
}

/* Splash effect */
.splash{
  position:fixed;
  width:120px;
  height:120px;
  border-radius:50%;
  animation:explode 1s ease-out forwards;
  opacity:0.8;
  z-index:1;
}

@keyframes explode{
  0%{transform:scale(0);opacity:1;}
  100%{transform:scale(3);opacity:0;}
}

/* Extra small devices */
@media(max-width:350px){
  .card{
    padding:25px 15px;
  }
  .btn{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="card">
  <h2>Happy</h2>
  <h1>HOLI</h1>

  <div class="emoji">🎨🌈✨</div>

  <div class="message">
   May the colors of Holi brighten your life with peace, happiness, and good health.
  </div>

  <div class="from">— From: Madhav Jha</div>

  <button class="btn" onclick="celebrate()">Celebrate 🎉</button>
</div>

<script>
function createSplash(){
  const splash=document.createElement("div");
  splash.classList.add("splash");
  splash.style.left=Math.random()*window.innerWidth+"px";
  splash.style.top=Math.random()*window.innerHeight+"px";
  splash.style.background=`hsl(${Math.random()*360},100%,50%)`;
  document.body.appendChild(splash);
  setTimeout(()=>{splash.remove();},1000);
}

function celebrate(){
  for(let i=0;i<30;i++){
    setTimeout(createSplash,i*80);
  }
}
</script>

</body>
</html>
