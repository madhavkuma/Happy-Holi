<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi - Madhav Jha</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#ff004c,#ff7a00,#00c3ff);
  animation:bgMove 8s infinite alternate ease-in-out;
  padding:20px;
  overflow:hidden;
}

@keyframes bgMove{
  0%{filter:hue-rotate(0deg);}
  100%{filter:hue-rotate(40deg);}
}

.card{
  background:#b3122d;
  width:100%;
  max-width:400px;
  border-radius:20px;
  padding:35px 25px;
  text-align:center;
  color:white;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
  z-index:2;
}

.card h2{
  font-size:28px;
  font-weight:300;
}

.card h1{
  font-size:60px;
  font-weight:900;
  letter-spacing:4px;
}

.message{
  margin-top:15px;
  font-size:15px;
  line-height:1.6;
}

.from{
  margin-top:15px;
  font-weight:bold;
  color:#ffd700;
}

.btn{
  margin-top:25px;
  padding:14px 25px;
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  background:#ffd700;
  color:#b3122d;
  font-size:16px;
  transition:0.3s;
  width:100%;
}

.btn:hover{
  transform:scale(1.08);
}

/* Splash effect */
.splash{
  position:fixed;
  width:120px;
  height:120px;
  border-radius:50%;
  animation:explode 1s ease-out forwards;
  opacity:0.8;
  z-index:1;
}

@keyframes explode{
  0%{transform:scale(0);opacity:1;}
  100%{transform:scale(3);opacity:0;}
}
</style>
</head>

<body>

<div class="card">
  <h2>Happy</h2>
  <h1>HOLI</h1>

  <div class="message">
   May the colors of Holi brighten your life with peace, happiness, and good health.
  </div>

  <div class="from">— From: Madhav Jha</div>

  <button class="btn" onclick="celebrate()">🎉 Celebrate</button>
</div>

<audio id="holiSong" src="happy_holi.mp3"></audio>

<script>
const song = document.getElementById("holiSong");
let interval;

// Create splash
function createSplash(){
  const splash=document.createElement("div");
  splash.classList.add("splash");
  splash.style.left=Math.random()*window.innerWidth+"px";
  splash.style.top=Math.random()*window.innerHeight+"px";
  splash.style.background=`hsl(${Math.random()*360},100%,50%)`;
  document.body.appendChild(splash);
  setTimeout(()=>{splash.remove();},1000);
}

function celebrate(){
  song.play();

  // Start continuous splashes
  interval = setInterval(createSplash, 150);

  // Stop after 15 seconds
  setTimeout(()=>{
    clearInterval(interval);
  },15000);
}
</script>

</body>
</html>
